name: Gerar Curriculo

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Bibliotecas
        run: pip install fpdf2

      - name: Gerar
        run: python gerar_pdf.py

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: curriculo-final
          path: curriculo_fabiano.pdf