name: CI - Automação Integrada CV e README

on:
  push:
    branches: [ main ]
    paths:
      - 'dados_curriculo.json'
      - 'gerar_pdf.py'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Instalar Dependências
        run: pip install fpdf2

      - name: Gerar Arquivos
        run: python gerar_pdf.py

      - name: Sincronizar GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add curriculo_fabiano.pdf README.md
          git commit -m "Automação: PDF e README sincronizados" || exit 0
          git push
