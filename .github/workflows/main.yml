name: CI - Automação Integrada CV e README

on:
  push:
    branches: [ main ]
    paths:
      - 'dados_curriculo.json'
      - 'gerar_pdf.py'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Instalar Dependência FPDF
        run: pip install fpdf

      - name: Executar Automação
        run: python gerar_pdf.py

      - name: Sincronizar Arquivos no GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # Adiciona os dois arquivos gerados
          git add curriculo_fabiano.pdf README.md
          git commit -m "Automação: PDF e README sincronizados" || exit 0
          git push
