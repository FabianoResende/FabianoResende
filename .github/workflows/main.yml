name: CI - Atualizar CV e README

on:
  push:
    branches: [ main ]
    paths:
      - 'dados_curriculo.json'
      - 'gerar_pdf.py'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Instalar Dependências
        run: pip install fpdf

      - name: Executar Gerador de CV e README
        run: python gerar_pdf.py

      - name: Salvar Alterações (PDF e README)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add curriculo_fabiano.pdf README.md
          git commit -m "Automação: PDF e README atualizados conforme JSON" || exit 0
          git push
