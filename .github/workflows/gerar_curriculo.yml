   name: Gerar Curriculo PDF

on:
  push:
    paths:
      - "README.md"  # O robô agora vigia seu perfil principal
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v3

      - name: Instalar dependências
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive texlive-xetex texlive-fonts-recommended texlive-lang-portuguese

      - name: Gerar PDF a partir do Markdown
        run: |
          pandoc README.md \
            --from markdown \
            --pdf-engine=xelatex \
            -V lang=pt-BR \
            -V mainfont="DejaVu Sans" \
            -V geometry:margin=1in \
            -o curriculo_fabiano.pdf

      - name: Commit e push do PDF gerado
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add curriculo_fabiano.pdf
          git commit -m "PDF atualizado automaticamente" || echo "Nenhuma alteração para commitar"
          git push  

