name: Gerar Curriculo PDF

on:
  push:
    paths:
      - "README.md"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Esta seção abaixo é essencial para o robô ter permissão de escrita
    permissions:
      contents: write

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Instalar dependencias
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended texlive-lang-portuguese

      - name: Gerar PDF
        run: |
          pandoc README.md \
          --from markdown \
          --pdf-engine=xelatex\
          -V lang=pt-BR \
          -V mainfont="DejaVu Sans" \
          -o curriculo_fabiano.pdf

      - name: Salvar PDF no repositorio
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add curriculo_fabiano.pdf
          git commit -m "PDF atualizado automaticamente" || echo "Sem alterações"
          git push
