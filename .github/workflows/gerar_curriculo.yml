name: Sincronizar CV e README

on:
  push:
    paths:
      - 'dados_curriculo.json' # O gatilho principal
  workflow_dispatch: # Permite rodar manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          pip install fpdf2

      - name: Executar Automações
        run: |
          python gerar_pdf.py       # Gera o PDF limpo para recrutadores
          python atualizar_readme.py # Atualiza o perfil com badges

      - name: Salvar alteracoes no GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add curriculo_fabiano.pdf README.md
          git commit -m "Automático: PDF e README atualizados via JSON" || echo "Sem alterações"
          git push
