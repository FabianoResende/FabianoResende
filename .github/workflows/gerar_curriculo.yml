name: Gerar Curriculo Automático

on:
  push:
    paths:
      - 'dados_curriculo.json' # O robô só acorda se você mexer no JSON
  workflow_dispatch: # Permite rodar manualmente se quiser

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          pip install fpdf2 # Instala a biblioteca que gera o PDF

      - name: Gerar PDF via Python
        run: |
          python gerar_pdf.py # Executa o seu script inteligente

      - name: Salvar PDF no repositorio
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add curriculo_fabiano.pdf
          git commit -m "PDF atualizado automaticamente via Python" || echo "Sem alterações"
          git push
